spring:
  application:
    name: gridwar-api
  datasource:
    # Railway Postgres exposes PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE when linked.
    url: jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME:gridwar}}
    username: ${PGUSER:${DB_USER:gridwar}}
    password: ${PGPASSWORD:${DB_PASSWORD:gridwar}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

gridwar:
  grid-size: 30
  max-energy: 20
  energy-regen-minutes: 5
  action-cooldown-ms: 3000
  captcha-after-actions: 40
